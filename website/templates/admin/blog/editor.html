<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit: ' + post.title if post else 'New Post' }} — SkillMind Blog Admin</title>
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0c1115; color:#e2e8f0; font-family:'Inter',sans-serif; padding:1.5rem; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        h1 { font-size:1.4rem; }
        .toolbar { display:flex; gap:0.5rem; }
        .btn { display:inline-block; padding:0.6rem 1.2rem; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.9rem; cursor:pointer; border:none; }
        .btn-primary { background:#f6571e; color:#fff; }
        .btn-primary:hover { background:#e5491a; }
        .btn-success { background:#1abc9c; color:#fff; }
        .btn-success:hover { background:#16a085; }
        .btn-ghost { background:transparent; border:1px solid rgba(255,255,255,0.12); color:#94a3b8; }
        .btn-ghost:hover { border-color:#f6571e; color:#f6571e; }
        .btn-danger { background:#cf2e2e; color:#fff; }
        .form-grid { display:grid; grid-template-columns:1fr 320px; gap:1.5rem; }
        .main-col { display:flex; flex-direction:column; gap:1rem; }
        .side-col { display:flex; flex-direction:column; gap:1rem; }
        .field { display:flex; flex-direction:column; gap:0.4rem; }
        .field label { font-size:0.8rem; color:#94a3b8; text-transform:uppercase; font-weight:600; }
        .field input, .field textarea, .field select { width:100%; padding:0.6rem 0.8rem; background:#16181d; border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:#fff; font-size:0.95rem; font-family:inherit; }
        .field input:focus, .field textarea:focus { outline:none; border-color:#f6571e; }
        .field textarea { resize:vertical; min-height:80px; }
        .card { background:#16181d; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:1.25rem; }
        .card h3 { font-size:0.9rem; margin-bottom:1rem; color:#f6571e; }
        .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .saved-indicator { color:#1abc9c; font-size:0.85rem; display:none; }
        @media (max-width:900px) { .form-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a href="{{ url_for('blog_admin.index') }}" style="color:#94a3b8;text-decoration:none;font-size:0.85rem;">&larr; All Posts</a>
            <h1>{{ 'Edit Post' if post else 'New Post' }}</h1>
        </div>
        <div class="toolbar">
            <span class="saved-indicator" id="savedMsg">Saved!</span>
            <button class="btn btn-primary" onclick="savePost()">Save</button>
            {% if post %}
            {% if post.status == 'draft' %}
            <button class="btn btn-success" onclick="saveAndPublish()">Publish</button>
            {% else %}
            <button class="btn btn-ghost" onclick="unpublish()">Unpublish</button>
            {% endif %}
            <button class="btn btn-danger" onclick="if(confirm('Delete this post?')) deletePost()">Delete</button>
            {% endif %}
        </div>
    </div>

    <div class="form-grid">
        <div class="main-col">
            <div class="field">
                <label>Title</label>
                <input type="text" id="title" value="{{ post.title if post else '' }}" placeholder="Post title...">
            </div>

            <div class="field">
                <label>Content</label>
                <textarea id="postContent" style="visibility:hidden;">{{ (post.content if post else '') | e }}</textarea>
            </div>
        </div>

        <div class="side-col">
            <div class="card">
                <h3>Post Settings</h3>
                <div class="field">
                    <label>Slug</label>
                    <input type="text" id="slug" value="{{ post.slug if post else '' }}" placeholder="auto-generated-from-title">
                </div>
                <div class="field" style="margin-top:0.75rem;">
                    <label>Language</label>
                    <select id="language">
                        <option value="en" {{ 'selected' if not post or post.language == 'en' }}>English</option>
                        <option value="de" {{ 'selected' if post and post.language == 'de' }}>Deutsch</option>
                    </select>
                </div>
                <div class="field" style="margin-top:0.75rem;">
                    <label>Author</label>
                    <input type="text" id="author" value="{{ post.author if post else 'Antonio Blago' }}">
                </div>
            </div>

            <div class="card">
                <h3>SEO</h3>
                <div class="field">
                    <label>Excerpt</label>
                    <textarea id="excerpt" rows="3" placeholder="Short description for blog listing...">{{ post.excerpt if post else '' }}</textarea>
                </div>
                <div class="field" style="margin-top:0.75rem;">
                    <label>Meta Description</label>
                    <textarea id="metaDesc" rows="3" placeholder="SEO meta description (max 160 chars)...">{{ post.meta_description if post else '' }}</textarea>
                </div>
            </div>

            <div class="card">
                <h3>Media & Taxonomy</h3>
                <div class="field">
                    <label>Featured Image URL</label>
                    <input type="text" id="featuredImage" value="{{ post.featured_image_url if post else '' }}" placeholder="/static/img/...">
                </div>
                <div class="field" style="margin-top:0.75rem;">
                    <label>Categories (comma-separated)</label>
                    <input type="text" id="categories" value="{{ post.categories | join(', ') if post and post.categories else '' }}" placeholder="Tutorial, AI">
                </div>
                <div class="field" style="margin-top:0.75rem;">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="tags" value="{{ post.tags | join(', ') if post and post.tags else '' }}" placeholder="obsidian, wiki, ai">
                </div>
            </div>
        </div>
    </div>

    <script>
    const POST_ID = {{ post.id if post else 'null' }};

    tinymce.init({
        selector: '#postContent',
        height: 600,
        skin: 'oxide-dark',
        content_css: 'dark',
        plugins: 'lists link image code table autolink wordcount searchreplace fullscreen media',
        toolbar: 'undo redo | blocks | bold italic underline strikethrough | alignleft aligncenter alignright | bullist numlist | link image media table | code fullscreen',
        menubar: 'file edit view insert format tools table',
        content_style: 'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; color: #e2e8f0; background: #1a1a1a; line-height: 1.7; } img { max-width: 100%; border-radius: 8px; }',
        branding: false,
        promotion: false,
        setup: function(editor) {
            editor.on('init', function() {
                document.getElementById('postContent').style.visibility = 'visible';
            });
        }
    });

    function getData() {
        return {
            title: document.getElementById('title').value,
            slug: document.getElementById('slug').value,
            content: tinymce.get('postContent').getContent(),
            excerpt: document.getElementById('excerpt').value,
            meta_description: document.getElementById('metaDesc').value,
            featured_image_url: document.getElementById('featuredImage').value,
            language: document.getElementById('language').value,
            author: document.getElementById('author').value,
            categories: document.getElementById('categories').value,
            tags: document.getElementById('tags').value,
        };
    }

    async function savePost() {
        const url = POST_ID ? `/admin/blog/${POST_ID}/save` : '/admin/blog/save';
        const resp = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(getData())
        });
        const result = await resp.json();
        if (result.status === 'created' && result.id > 0) {
            window.location.href = `/admin/blog/${result.id}/edit`;
        } else {
            const msg = document.getElementById('savedMsg');
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 2000);
        }
    }

    async function saveAndPublish() {
        await savePost();
        const id = POST_ID || (await fetch('/admin/blog/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(getData())}).then(r=>r.json())).id;
        await fetch(`/admin/blog/${id}/publish`, {method:'POST'});
        location.reload();
    }

    async function unpublish() {
        await fetch(`/admin/blog/${POST_ID}/unpublish`, {method:'POST'});
        location.reload();
    }

    async function deletePost() {
        await fetch(`/admin/blog/${POST_ID}/delete`, {method:'POST'});
        window.location.href = '/admin/blog/';
    }
    </script>
</body>
</html>
