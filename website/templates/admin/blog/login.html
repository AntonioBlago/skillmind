<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin — SkillMind</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0c1115; color:#e2e8f0; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login { background:#16181d; padding:2.5rem; border-radius:12px; border:1px solid rgba(255,255,255,0.08); width:100%; max-width:380px; }
        h1 { font-size:1.5rem; margin-bottom:1.5rem; text-align:center; }
        label { display:block; margin-bottom:0.5rem; font-size:0.9rem; color:#94a3b8; }
        input { width:100%; padding:0.75rem 1rem; background:#0c1115; border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:#fff; font-size:1rem; margin-bottom:1rem; }
        input:focus { outline:none; border-color:#f6571e; }
        button { width:100%; padding:0.75rem; background:#f6571e; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; }
        button:hover { background:#e5491a; }
        .error { color:#cf2e2e; font-size:0.85rem; margin-bottom:1rem; text-align:center; }
    </style>
</head>
<body>
    <div class="login">
        <h1>Blog Admin</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <label>Password</label>
            <input type="password" name="password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
